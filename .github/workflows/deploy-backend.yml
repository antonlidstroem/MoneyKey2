name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      # 1. Logga in på Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 2. Bygg och pusha Docker-imagen till ditt register
      - name: Build and push Docker image
        run: |
          # Byt ut namnet på Dockerfilen om den heter något annat eller ligger i en annan mapp
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/moneykey-api:${{ github.sha }} -f Dockerfile .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/moneykey-api:${{ github.sha }}

      # 3. Logga in i Azure för att kunna uppdatera Container Appen
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4. Uppdatera Azure Container App med den nya imagen
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: LifeMissionAssets
          containerAppName: ca-money-key-api
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/moneykey-api:${{ github.sha }}
