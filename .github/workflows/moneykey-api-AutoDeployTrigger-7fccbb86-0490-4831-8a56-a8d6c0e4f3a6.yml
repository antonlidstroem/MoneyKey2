name: Trigger auto deployment for moneykey-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/moneykey-api-AutoDeployTrigger-7fccbb86-0490-4831-8a56-a8d6c0e4f3a6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MONEYKEYAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MONEYKEYAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MONEYKEYAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.MONEYKEYAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MONEYKEYAPI_REGISTRY_PASSWORD }}
          containerAppName: moneykey-api
          resourceGroup: moneykey-group
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


