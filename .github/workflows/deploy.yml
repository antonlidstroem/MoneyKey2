name: Deploy API to Azure Container Apps

on:
  push:
    branches:
      - master # Ändra till 'master' om din huvudbranch heter så

permissions:
  id-token: write # Kritiskt! Detta tillåter OIDC (det digitala handslaget)
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry (ACR)
        run: az acr login --name moneykeygistry

      - name: Build and Push Docker image
        run: |
          docker build -t moneykeygistry.azurecr.io/ca-money-key-api:${{ github.sha }} .
          docker push moneykeygistry.azurecr.io/ca-money-key-api:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-money-key-api
          resourceGroup: LifeMissionAssets
          imageToDeploy: moneykeygistry.azurecr.io/ca-money-key-api:${{ github.sha }}
